<!DOCTYPE html>
<html>
<head>
<title>Animated Website</title>

<style>

body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(-45deg, #3498db, #6dd5fa, #2c3e50, #00c6ff);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  color:#333;
  transition:0.4s;
  scroll-behavior:smooth;
}

.bg-animation{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  overflow:hidden;
  z-index:-1;
}

.bg-animation span{
  position:absolute;
  width:20px;
  height:20px;
  background:rgba(255,255,255,0.2);
  animation: move 20s linear infinite;
  bottom:-150px;
  border-radius:50%;
}

.bg-animation span:nth-child(1){ left:10%; animation-delay:0s; }
.bg-animation span:nth-child(2){ left:20%; animation-delay:2s; }
.bg-animation span:nth-child(3){ left:30%; animation-delay:4s; }
.bg-animation span:nth-child(4){ left:50%; animation-delay:6s; }
.bg-animation span:nth-child(5){ left:70%; animation-delay:8s; }
.bg-animation span:nth-child(6){ left:90%; animation-delay:10s; }

@keyframes move{
  0%{ transform:translateY(0) scale(1); opacity:1; }
  100%{ transform:translateY(-1000px) scale(2); opacity:0; }
}

@keyframes gradientBG {
  0%{ background-position: 0% 50%; }
  50%{ background-position: 100% 50%; }
  100%{ background-position: 0% 50%; }
}

.dark-btn{
  position:fixed;
  top:20px;
  right:20px;
  padding:10px 20px;
  background:#3498db;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
}

.dark-btn:hover{
  transform:scale(1.1);
  background:#2980b9;
}

nav{
  display:flex;
  justify-content:center;
  background:#2c3e50;
  padding:15px;
}

nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-size:18px;
  position:relative;
}

nav a::after{
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  background:#3498db;
  left:0;
  bottom:-5px;
  transition:0.3s;
}

nav a:hover::after{
  width:100%;
}

section{
  padding:80px;
  text-align:center;
}

.card{
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding:30px;
  margin:auto;
  width:50%;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
}

#contact{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input{
  width:80%;
  padding:10px;
  margin:10px;
  border-radius:5px;
  border:1px solid #ccc;
  transition:0.3s;
}

input:focus{
  border-color:#3498db;
  outline:none;
  box-shadow:0 0 10px rgba(52,152,219,0.5);
}

button{
  padding:10px 20px;
  border:none;
  background:#3498db;
  color:white;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  background:#2980b9;
}

.error{
  color:red;
  font-size:14px;
}

.dark{
  color:white;
}

.dark .card{
  background: rgba(30,30,30,0.8);
}

.dark nav{
  background:black;
}

.hidden{
  opacity:0;
  transform:translateY(50px);
  transition:all 0.6s ease;
}

.show{
  opacity:1;
  transform:translateY(0);
}

</style>

</head>

<body>

<div class="bg-animation">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

<button class="dark-btn" id="darkToggle">🌙 Dark Mode</button>

<nav>
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</nav>

<section id="home" class="hidden">
<div class="card">
<h1>Welcome</h1>
<p>This is my animated website 🚀</p>
</div>
</section>

<section id="contact" class="hidden">
<div class="card">

<h2>Contact Form</h2>

<form id="contactForm">

<input type="text" id="name" placeholder="Enter your name">
<div class="error" id="nameError"></div>

<input type="email" id="email" placeholder="Enter your email">
<div class="error" id="emailError"></div>

<button type="submit">Submit</button>

</form>

</div>
</section>

<section id="about" class="hidden">
<div class="card">
<h2>About</h2>
<p>This website is made using HTML CSS and JavaScript.</p>
</div>
</section>

<script>

const darkBtn = document.getElementById("darkToggle");

darkBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");
  darkBtn.textContent = document.body.classList.contains("dark") 
    ? "☀ Light Mode" 
    : "🌙 Dark Mode";
});

const form = document.getElementById("contactForm");

form.addEventListener("submit", function(e){
  e.preventDefault();

  let isValid = validateForm();

  if(isValid){
    alert("Form Submitted Successfully ✅");
    form.reset();
  }
});

function validateForm(){
  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();

  let nameError = document.getElementById("nameError");
  let emailError = document.getElementById("emailError");

  nameError.textContent = "";
  emailError.textContent = "";

  let isValid = true;

  if(name === ""){
    nameError.textContent = "Name is required";
    isValid = false;
  }

  if(email === ""){
    emailError.textContent = "Email is required";
    isValid = false;
  } else if(!/^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(email)){
    emailError.textContent = "Invalid email format";
    isValid = false;
  }

  return isValid;
}

const hiddenElements = document.querySelectorAll(".hidden");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

hiddenElements.forEach(el => observer.observe(el));

</script>

</body>
</html>
