<!DOCTYPE html>
<html>
<head>
<title>Simple Dark Mode Website</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(45deg, #3498db, #6dd5fa);
  background-size:200% 200%;
  animation: lightBG 6s infinite alternate;
  transition:0.5s;
  color:#000;
}

.dark{
  background: linear-gradient(45deg, #000000, #2c3e50);
  background-size:200% 200%;
  animation: darkBG 6s infinite alternate;
  color:white;
}

@keyframes lightBG{
  0%{background-position:left;}
  100%{background-position:right;}
}

@keyframes darkBG{
  0%{background-position:left;}
  100%{background-position:right;}
}

.bg span{
  position:absolute;
  width:15px;
  height:15px;
  background:white;
  border-radius:50%;
  opacity:0.5;
  animation: move 10s linear infinite;
}

.dark .bg span{
  background:cyan;
}

@keyframes move{
  0%{transform:translateY(0);}
  100%{transform:translateY(-800px);}
}

.dark-btn{
  position:fixed;
  top:20px;
  right:20px;
  padding:10px;
  border:none;
  background:#3498db;
  color:white;
  cursor:pointer;
  border-radius:5px;
}

section{
  text-align:center;
  margin-top:120px;
}

.card{
  background:white;
  width:60%;
  margin:auto;
  padding:20px;
  border-radius:10px;
}

.dark .card{
  background:#222;
}

input{
  width:80%;
  padding:10px;
  margin:10px;
}

.error{
  color:red;
  font-size:14px;
}

</style>

</head>

<body>

<div class="bg">
  <span style="left:10%; animation-delay:0s;"></span>
  <span style="left:30%; animation-delay:2s;"></span>
  <span style="left:50%; animation-delay:4s;"></span>
  <span style="left:70%; animation-delay:6s;"></span>
  <span style="left:90%; animation-delay:8s;"></span>
</div>

<button class="dark-btn" onclick="toggleDark()" id="modeBtn">🌙 Dark</button>

<section>
  <h1>My Website 🚀</h1>
</section>

<section>
  <div class="card">
    <h2>Contact Form</h2>

    <form onsubmit="return validateForm()">

      <input type="text" id="name" placeholder="Enter Name">
      <div class="error" id="nameError"></div>

      <input type="email" id="email" placeholder="Enter Email">
      <div class="error" id="emailError"></div>

      <br>
      <button type="submit">Submit</button>

    </form>

  </div>
</section>
<section>
  <div class="card">
    <h2>About Me</h2>
    <p>Hello 👋, I am <b>Abhiraj Rajput</b>.</p>
    <p>I am learning Web Development.</p>
    <p>My goal is Software Engineer 🚀.</p>
  </div>
</section>

<script>

// DARK MODE TOGGLE
function toggleDark(){
  document.body.classList.toggle("dark");

  let btn = document.getElementById("modeBtn");

  if(document.body.classList.contains("dark")){
    btn.innerText = "☀ Light";
  } else {
    btn.innerText = "🌙 Dark";
  }
}

function validateForm(){
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;

  document.getElementById("nameError").innerText="";
  document.getElementById("emailError").innerText="";

  if(name==""){
    document.getElementById("nameError").innerText="Enter name";
    return false;
  }

  if(email==""){
    document.getElementById("emailError").innerText="Enter email";
    return false;
  }

  alert("Form Submitted ✅");
  return true;
}

</script>

</body>
</html>
