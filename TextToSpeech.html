<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Speech Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            min-height: 150px;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
        }
        
        select, input[type="range"] {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        
        select:focus, input[type="range"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .range-value {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-speak {
            background: #667eea;
            color: white;
        }
        
        .btn-speak:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn-speak:active {
            transform: translateY(0);
        }
        
        .btn-stop {
            background: #e74c3c;
            color: white;
        }
        
        .btn-stop:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }
        
        .btn-stop:active {
            transform: translateY(0);
        }
        
        .btn-clear {
            background: #95a5a6;
            color: white;
        }
        
        .btn-clear:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }
        
        .status {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            display: none;
        }
        
        .status.active {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        
        .status.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .controls {
                grid-template-columns: 1fr;
            }
            
            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔊 Text-to-Speech</h1>
        
        <div class="form-group">
            <label for="textInput">Enter Text:</label>
            <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="language">Language:</label>
                <select id="language">
                    <option value="en-US">English (US)</option>
                    <option value="en-GB">English (UK)</option>
                    <option value="hi-IN">Hindi</option>
                    <option value="es-ES">Spanish</option>
                    <option value="fr-FR">French</option>
                    <option value="de-DE">German</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="rate">Speed: <span class="range-value" id="rateValue">1x</span></label>
                <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
            </div>
            
            <div class="control-group">
                <label for="pitch">Pitch: <span class="range-value" id="pitchValue">1x</span></label>
                <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
            </div>
            
            <div class="control-group">
                <label for="volume">Volume: <span class="range-value" id="volumeValue">100%</span></label>
                <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
            </div>
        </div>
        
        <div class="buttons">
            <button class="btn-speak" onclick="speak()">▶ Speak</button>
            <button class="btn-stop" onclick="stop()">⏹ Stop</button>
            <button class="btn-clear" onclick="clearText()">🗑 Clear</button>
        </div>
        
        <div class="status" id="status"></div>
    </div>
    
    <script>
        const textInput = document.getElementById('textInput');
        const languageSelect = document.getElementById('language');
        const rateSlider = document.getElementById('rate');
        const pitchSlider = document.getElementById('pitch');
        const volumeSlider = document.getElementById('volume');
        const statusDiv = document.getElementById('status');
        
        // Update range values display
        rateSlider.addEventListener('input', () => {
            document.getElementById('rateValue').textContent = rateSlider.value + 'x';
        });
        
        pitchSlider.addEventListener('input', () => {
            document.getElementById('pitchValue').textContent = pitchSlider.value + 'x';
        });
        
        volumeSlider.addEventListener('input', () => {
            document.getElementById('volumeValue').textContent = Math.round(volumeSlider.value * 100) + '%';
        });
        
        function speak() {
            const text = textInput.value.trim();
            
            if (!text) {
                showStatus('Please enter some text!', 'error');
                return;
            }
            
            // Cancel any ongoing speech
            speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = languageSelect.value;
            utterance.rate = parseFloat(rateSlider.value);
            utterance.pitch = parseFloat(pitchSlider.value);
            utterance.volume = parseFloat(volumeSlider.value);
            
            utterance.onstart = () => {
                showStatus('🔊 Speaking...', 'active');
            };
            
            utterance.onend = () => {
                showStatus('✅ Finished!', 'active');
                setTimeout(() => statusDiv.classList.remove('active'), 2000);
            };
            
            utterance.onerror = () => {
                showStatus('❌ Error occurred!', 'error');
            };
            
            speechSynthesis.speak(utterance);
        }
        
        function stop() {
            speechSynthesis.cancel();
            statusDiv.classList.remove('active', 'error');
        }
        
        function clearText() {
            textInput.value = '';
            speechSynthesis.cancel();
            statusDiv.classList.remove('active', 'error');
            textInput.focus();
        }
        
        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.classList.remove('active', 'error');
            statusDiv.classList.add(type);
        }
        
        // Check browser support
        if (!('speechSynthesis' in window)) {
            showStatus('❌ Text-to-Speech not supported in your browser!', 'error');
        }
    </script>
</body>
</html>
